<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Class Attendance Cheker</title>
    <py-config>
            packages = ['numpy', 'matplotlib']
        </py-config>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #0056b3;
    }
    .container {
        background: #f78b60;
        padding: 20px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
        width: 450px;
        height: 400px;
        border: 5px solid #b3532d;
    }
    h1 {
        color: #b32daf;
        font-weight: bold;
    }
    input {
        margin: 10px;
        padding: 8px;
        width: 100px;
        border: 1px solid #ccc;
        border-radius: 6px;
        text-align: center;
    }
    button:hover {
        background: #0056b3;
    }
    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .submit-btn {
        background: #e63946;
        color: white;
    }
    label {
        font-size: 14px;
        display: block;
        margin-top: 5px;
    }

    select, input {
        width: 300px;
        padding: 8px;
        border-radius: 5px;
        border: none;
        background: #eee;
    }
    </style>
<body>
    
    <div class="container">
        <h1>Attendance tracker</h1>
        <br>
        <br>
        <label>Select Day</label>
            <select id="day">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>
        <br>
        <label>Absences</label>
            <input type="number" id="absences" value="0">
        <br>
        <br>
        <button class="submit-btn" py-click="addData">Submit</button>
    </div>
    <div id="output"></div>
    <script type="py" src="main.py"></script>
</body>
</html>
